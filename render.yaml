services:
  - type: web
    name: poker-app
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: MONGO_DB_URL
        value: mongodb://127.0.0.1:27017/emrgcall
      - key: ACCOUNT_SID
        sync: false
      - key: AUTH_TOKEN
        sync: false
      - key: POST_URL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: FLASK_ENV
        value: production
    # To persist MongoDB data across restarts/deploys, upgrade to a paid
    # plan and add a disk, e.g.:
    # disk:
    #   name: mongo-data
    #   mountPath: /data/db
    #   sizeGB: 1
